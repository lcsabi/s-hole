name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
      - name: golangci-lint
        # Action v8+ installs golangci-lint v2, required by the
        # version:"2" config schema and a Go-1.25 module target. Action
        # v6 installed v1.64.x, which is built with an older Go and
        # refuses to load the config at all — see CL 24 addendum.
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest

  test:
    name: build / vet / test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
      - name: Cache Go module + build cache
        uses: actions/cache@v6
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-
      - name: Verify module integrity
        run: go mod verify
      - name: Build
        run: go build ./...
      - name: Vet
        run: go vet ./...
      - name: Test (with race detector)
        run: go test -race -count=1 ./...
      - name: Benchmarks (smoke)
        # Runs each benchmark once so a build-time regression in the
        # benchmark body is caught here — not a perf measurement.
        run: go test -run=^$ -bench=. -benchtime=1x ./...

  cross-compile:
    name: cross-compile / ${{ matrix.target.goos }}-${{ matrix.target.goarch }}
    runs-on: ubuntu-latest
    needs: [test, lint]
    strategy:
      matrix:
        target:
          - { goos: linux,  goarch: amd64 }
          - { goos: linux,  goarch: arm64 }
          - { goos: linux,  goarch: arm, goarm: "7" }
          - { goos: windows, goarch: amd64 }
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
      - name: Resolve version metadata
        id: meta
        run: |
          echo "version=$(git describe --tags --always --dirty 2>/dev/null || echo dev)" >> $GITHUB_OUTPUT
          echo "commit=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT
      - name: Build ${{ matrix.target.goos }}/${{ matrix.target.goarch }}
        env:
          GOOS: ${{ matrix.target.goos }}
          GOARCH: ${{ matrix.target.goarch }}
          GOARM: ${{ matrix.target.goarm }}
          CGO_ENABLED: "0"
        run: |
          go build -ldflags="-s -w \
            -X 'github.com/lcsabi/s-hole/internal/version.Version=${{ steps.meta.outputs.version }}' \
            -X 'github.com/lcsabi/s-hole/internal/version.Commit=${{ steps.meta.outputs.commit }}' \
            -X 'github.com/lcsabi/s-hole/internal/version.BuildDate=${{ steps.meta.outputs.date }}'" \
            -o /tmp/s-hole ./cmd/s-hole
