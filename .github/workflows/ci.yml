name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    name: build / vet / test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: Cache Go module + build cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-
      - name: Build
        run: go build ./...
      - name: Vet
        run: go vet ./...
      - name: Test (with race detector)
        run: go test -race -count=1 ./...
      - name: Benchmarks (smoke)
        # Runs each benchmark once so a build-time regression in the
        # benchmark body is caught here — not a perf measurement.
        run: go test -run=^$ -bench=. -benchtime=1x ./...

  cross-compile:
    name: cross-compile / ${{ matrix.target }}
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        target:
          - { goos: linux,  goarch: amd64 }
          - { goos: linux,  goarch: arm64 }
          - { goos: linux,  goarch: arm, goarm: "7" }
          - { goos: windows, goarch: amd64 }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: Build ${{ matrix.target.goos }}/${{ matrix.target.goarch }}
        env:
          GOOS: ${{ matrix.target.goos }}
          GOARCH: ${{ matrix.target.goarch }}
          GOARM: ${{ matrix.target.goarm }}
          CGO_ENABLED: "0"
        run: go build -ldflags="-s -w" -o /tmp/s-hole .
